<div class="container-fluid">
  <div class="container mx-auto">
    <div class="row mt-4 d-flex justify-content-center align-items-center" style="height: 500px;">
      <div class="col-md-6 bg-white shadow">
        <div class="card bg-primary mt-4">
          <h4 class="text-white p-3 pt-2 pb-2 text-center">To Do App</h4>
        </div>

        <div class="shadow">
          <div class="input-group p-4">
            <input type="text" class="form-control" placeholder="Enter Task" name="task" [(ngModel)]="newTask">
            <button class="btn btn-outline-success" type="button" (click)="addTask()">+</button>
          </div>
        </div>

        <h4 class="text-primary mt-4">Tasks: </h4>

        <div style="overflow-y: auto; height: 350px;">
          <div class="m-3" *ngFor="let task of tasks; let i = index">
            <div class="p-2 shadow border">
              <div class="input-group row ps-3">
                <div class="card col-md-10 border-0">{{ task.task }}</div>
                <button class="btn btn-outline-primary col me-2" (click)="editTask(i)">E</button>
                <button class="btn btn-outline-danger col" (click)="deleteTask(i)">X</button>
              </div>
            </div>
          </div>
        </div>

        <div class="modal fade" id="editModal" tabindex="-1" role="dialog" aria-labelledby="editModalLabel" aria-hidden="true">
          <div class="modal-dialog" role="document">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title" id="editModalLabel">Edit Task</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close" (click)="closeModal()">
                  <span aria-hidden="true">&times;</span>
                </button>
              </div>
              <div class="modal-body">
                <input type="text" class="form-control" [(ngModel)]="editedTask">
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="closeModal()">Close</button>
                <button type="button" class="btn btn-primary" (click)="saveTask()">Save changes</button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
